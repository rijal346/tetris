<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --panel: #0d0d18;
    --border: #1a1a35;
    --text: #c8c8e8;
    --muted: #444466;
    --cyan:    #00f5ff;
    --yellow:  #ffe000;
    --purple:  #bf00ff;
    --green:   #00ff88;
    --red:     #ff2255;
    --orange:  #ff8800;
    --blue:    #0088ff;
    --ghost:   rgba(255,255,255,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow: hidden;
  }

  /* scanline */
  body::after {
    content:'';
    position:fixed;
    inset:0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events:none;
    z-index:999;
  }

  .watermark {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding: 10px 0;
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 10px;
    text-transform: uppercase;
    background: linear-gradient(90deg, transparent, rgba(0,245,255,0.12), transparent);
    border-bottom: 1px solid rgba(0,245,255,0.3);
    z-index: 1000;
    pointer-events: none;
    user-select: none;
  }

  .watermark span {
    background: linear-gradient(90deg, var(--cyan), #fff, var(--purple), var(--cyan));
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2.5s linear infinite;
    text-shadow: 0 0 20px var(--cyan);
    filter: drop-shadow(0 0 8px var(--cyan));
  }

  @keyframes shimmer {
    0% { background-position: 0% }
    100% { background-position: 300% }
  }

  .game-container {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  /* LEFT PANEL */
  .left-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 130px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
  }

  .panel-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .panel-value {
    font-size: 22px;
    font-weight: 900;
    color: var(--cyan);
    font-variant-numeric: tabular-nums;
    line-height: 1;
    word-break: break-all;
  }

  .level-bar {
    margin-top: 10px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .level-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 2px;
    transition: width 0.4s;
  }

  /* NEXT PIECE */
  #nextCanvas {
    display: block;
    margin: 0 auto;
    image-rendering: pixelated;
  }

  /* BOARD */
  .board-wrap {
    position: relative;
  }

  #gameCanvas {
    display: block;
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(0,245,255,0.05),
      0 0 40px rgba(0,245,255,0.06),
      0 0 80px rgba(0,0,0,0.8);
    image-rendering: pixelated;
  }

  /* OVERLAY */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(5,5,8,0.88);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    backdrop-filter: blur(3px);
    z-index: 10;
    transition: opacity 0.3s;
  }

  .overlay.hidden { opacity: 0; pointer-events: none; }

  .overlay-title {
    font-size: 36px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    text-align: center;
    line-height: 1;
  }

  .overlay-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 2px;
    text-align: center;
  }

  .start-btn {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    border: none;
    border-radius: 6px;
    color: #000;
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,245,255,0.5);
  }

  /* CONTROLS */
  .controls {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .key {
    background: var(--border);
    border-radius: 4px;
    padding: 3px 7px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--cyan);
    min-width: 28px;
    text-align: center;
  }

  .ctrl-desc {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* MOBILE BUTTONS */
  .mobile-controls {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
  }

  .mobile-row {
    display: flex;
    gap: 6px;
  }

  .mob-btn {
    width: 52px;
    height: 52px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--cyan);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    font-family: 'Share Tech Mono', monospace;
  }

  .mob-btn:active { background: #1a1a35; }
  .mob-btn.wide { width: 110px; font-size: 13px; letter-spacing: 1px; }

  @media (max-width: 600px) {
    .left-panel { width: 100px; }
    .left-panel .panel-value { font-size: 17px; }
    .controls { display: none; }
    .mobile-controls { display: flex; }
  }

  @media (max-width: 440px) {
    .game-container { gap: 10px; }
    .left-panel { width: 88px; }
  }
</style>
</head>
<body>

<div class="watermark"><span>✦ &nbsp; I N D R A &nbsp; ✦</span></div>

<div class="game-container">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="panel-box">
      <div class="panel-label">Score</div>
      <div class="panel-value" id="scoreVal">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Level</div>
      <div class="panel-value" id="levelVal">1</div>
      <div class="level-bar"><div class="level-fill" id="levelFill" style="width:0%"></div></div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Lines</div>
      <div class="panel-value" id="linesVal">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">Next</div>
      <canvas id="nextCanvas" width="90" height="90"></canvas>
    </div>
    <div class="panel-box controls">
      <div class="panel-label">Keys</div>
      <div class="ctrl-row"><span class="key">←→</span><span class="ctrl-desc">Gerak</span></div>
      <div class="ctrl-row" style="margin-top:6px"><span class="key">↑</span><span class="ctrl-desc">Putar</span></div>
      <div class="ctrl-row" style="margin-top:6px"><span class="key">↓</span><span class="ctrl-desc">Turun</span></div>
      <div class="ctrl-row" style="margin-top:6px"><span class="key">SPC</span><span class="ctrl-desc">Drop</span></div>
      <div class="ctrl-row" style="margin-top:6px"><span class="key">P</span><span class="ctrl-desc">Pause</span></div>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board-wrap">
    <canvas id="gameCanvas"></canvas>

    <div class="overlay" id="overlay">
      <div class="overlay-title">TETRIS</div>
      <div class="overlay-sub" id="overlayScore"></div>
      <div class="overlay-sub">Tekan tombol di bawah<br>atau ENTER untuk mulai</div>
      <button class="start-btn" id="startBtn" onclick="startGame()">MULAI MAIN</button>
    </div>
  </div>

</div>

<!-- Mobile controls -->
<div style="position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:100;">
  <div class="mobile-controls" id="mobileControls">
    <div class="mobile-row">
      <button class="mob-btn" id="rotBtn">↺</button>
    </div>
    <div class="mobile-row">
      <button class="mob-btn" id="leftBtn">←</button>
      <button class="mob-btn" id="downBtn">↓</button>
      <button class="mob-btn" id="rightBtn">→</button>
    </div>
    <div class="mobile-row">
      <button class="mob-btn wide" id="dropBtn">DROP</button>
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20;
let CELL;
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

function resize() {
  const maxH = Math.min(window.innerHeight - 160, 560);
  CELL = Math.floor(maxH / ROWS);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (state) draw();
}

// Tetromino shapes
const SHAPES = {
  I: { cells: [[0,0],[1,0],[2,0],[3,0]], color: '#00f5ff' },
  O: { cells: [[0,0],[1,0],[0,1],[1,1]], color: '#ffe000' },
  T: { cells: [[1,0],[0,1],[1,1],[2,1]], color: '#bf00ff' },
  S: { cells: [[1,0],[2,0],[0,1],[1,1]], color: '#00ff88' },
  Z: { cells: [[0,0],[1,0],[1,1],[2,1]], color: '#ff2255' },
  J: { cells: [[0,0],[0,1],[1,1],[2,1]], color: '#0088ff' },
  L: { cells: [[2,0],[0,1],[1,1],[2,1]], color: '#ff8800' },
};
const TYPES = Object.keys(SHAPES);

const SCORES = [0, 100, 300, 500, 800];

let state, gameLoop, dropInterval;

function newPiece(type) {
  const t = type || TYPES[Math.floor(Math.random() * TYPES.length)];
  const shape = SHAPES[t];
  return {
    type: t,
    color: shape.color,
    cells: shape.cells.map(c => [...c]),
    x: Math.floor(COLS / 2) - 1,
    y: 0
  };
}

function rotate(cells) {
  const mx = Math.max(...cells.map(c => c[0]));
  return cells.map(([x, y]) => [y, mx - x]);
}

function collide(cells, x, y, board) {
  return cells.some(([cx, cy]) => {
    const nx = cx + x, ny = cy + y;
    return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && board[ny][nx]);
  });
}

function place(piece, board) {
  piece.cells.forEach(([cx, cy]) => {
    const nx = cx + piece.x, ny = cy + piece.y;
    if (ny >= 0) board[ny][nx] = piece.color;
  });
}

function clearLines(board) {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++;
      r++;
    }
  }
  return cleared;
}

function ghostY(piece, board) {
  let gy = piece.y;
  while (!collide(piece.cells, piece.x, gy + 1, board)) gy++;
  return gy;
}

function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('mobileControls').style.display = 'flex';

  state = {
    board: Array.from({length: ROWS}, () => Array(COLS).fill(null)),
    current: newPiece(),
    next: newPiece(),
    score: 0,
    lines: 0,
    level: 1,
    paused: false,
    over: false
  };

  updateUI();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
}

function getSpeed() {
  return Math.max(80, 500 - (state.level - 1) * 45);
}

function tick() {
  if (state.paused || state.over) return;
  if (!collide(state.current.cells, state.current.x, state.current.y + 1, state.board)) {
    state.current.y++;
  } else {
    landPiece();
  }
  draw();
}

function landPiece() {
  place(state.current, state.board);
  const cleared = clearLines(state.board);
  state.lines += cleared;
  state.score += SCORES[cleared] * state.level;
  state.level = Math.floor(state.lines / 10) + 1;

  clearInterval(gameLoop);

  state.current = state.next;
  state.next = newPiece();

  if (collide(state.current.cells, state.current.x, state.current.y, state.board)) {
    gameOver();
    return;
  }

  gameLoop = setInterval(tick, getSpeed());
  updateUI();
}

function gameOver() {
  state.over = true;
  const ov = document.getElementById('overlay');
  ov.classList.remove('hidden');
  document.querySelector('.overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlayScore').textContent = `Score: ${state.score} · Level: ${state.level}`;
  document.getElementById('startBtn').textContent = 'MAIN LAGI';
}

function updateUI() {
  document.getElementById('scoreVal').textContent = state.score.toLocaleString();
  document.getElementById('levelVal').textContent = state.level;
  document.getElementById('linesVal').textContent = state.lines;
  const pct = (state.lines % 10) * 10;
  document.getElementById('levelFill').style.width = pct + '%';
  drawNext();
}

// ── DRAW ──
function drawCell(ctx, x, y, color, size, alpha = 1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);

  // shine
  const g = ctx.createLinearGradient(x*size, y*size, x*size + size, y*size + size);
  g.addColorStop(0, 'rgba(255,255,255,0.18)');
  g.addColorStop(1, 'rgba(0,0,0,0.25)');
  ctx.fillStyle = g;
  ctx.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
  ctx.globalAlpha = 1;
}

function draw() {
  if (!state) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
    }
  }

  // Board
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (state.board[r][c]) drawCell(ctx, c, r, state.board[r][c], CELL);
    }
  }

  // Ghost
  const gy = ghostY(state.current, state.board);
  state.current.cells.forEach(([cx, cy]) => {
    const nx = cx + state.current.x, ny = cy + gy;
    if (ny >= 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fillRect(nx * CELL + 1, ny * CELL + 1, CELL - 2, CELL - 2);
      ctx.strokeStyle = state.current.color + '44';
      ctx.lineWidth = 1;
      ctx.strokeRect(nx * CELL + 1, ny * CELL + 1, CELL - 2, CELL - 2);
    }
  });

  // Current piece
  state.current.cells.forEach(([cx, cy]) => {
    const nx = cx + state.current.x, ny = cy + state.current.y;
    if (ny >= 0) drawCell(ctx, nx, ny, state.current.color, CELL);
  });
}

function drawNext() {
  nextCtx.clearRect(0, 0, 90, 90);
  const cs = 18;
  const p = state.next;
  const minX = Math.min(...p.cells.map(c => c[0]));
  const minY = Math.min(...p.cells.map(c => c[1]));
  const maxX = Math.max(...p.cells.map(c => c[0]));
  const maxY = Math.max(...p.cells.map(c => c[1]));
  const ox = Math.floor((4 - (maxX - minX + 1)) / 2) - minX;
  const oy = Math.floor((4 - (maxY - minY + 1)) / 2) - minY;
  p.cells.forEach(([x, y]) => drawCell(nextCtx, x + ox, y + oy, p.color, cs));
}

// ── INPUT ──
function moveLeft()  { if (!state?.over && !state?.paused && !collide(state.current.cells, state.current.x - 1, state.current.y, state.board)) { state.current.x--; draw(); } }
function moveRight() { if (!state?.over && !state?.paused && !collide(state.current.cells, state.current.x + 1, state.current.y, state.board)) { state.current.x++; draw(); } }
function moveDown()  { if (!state?.over && !state?.paused) { if (!collide(state.current.cells, state.current.x, state.current.y + 1, state.board)) { state.current.y++; draw(); } else { clearInterval(gameLoop); landPiece(); draw(); } } }
function hardDrop()  {
  if (!state?.over && !state?.paused) {
    const gy = ghostY(state.current, state.board);
    state.score += (gy - state.current.y) * 2;
    state.current.y = gy;
    clearInterval(gameLoop);
    landPiece();
    draw();
    updateUI();
  }
}
function rotatePiece() {
  if (!state?.over && !state?.paused) {
    const rot = rotate(state.current.cells);
    let kick = 0;
    if (collide(rot, state.current.x, state.current.y, state.board)) {
      kick = state.current.x > COLS / 2 ? -1 : 1;
    }
    if (!collide(rot, state.current.x + kick, state.current.y, state.board)) {
      state.current.cells = rot;
      state.current.x += kick;
      draw();
    }
  }
}

document.addEventListener('keydown', e => {
  if (!state) { if (e.key === 'Enter') startGame(); return; }
  switch(e.key) {
    case 'ArrowLeft':  e.preventDefault(); moveLeft(); break;
    case 'ArrowRight': e.preventDefault(); moveRight(); break;
    case 'ArrowDown':  e.preventDefault(); moveDown(); break;
    case 'ArrowUp':    e.preventDefault(); rotatePiece(); break;
    case ' ':          e.preventDefault(); hardDrop(); break;
    case 'p': case 'P':
      state.paused = !state.paused;
      break;
    case 'Enter':
      if (state.over) startGame();
      break;
  }
});

// Mobile buttons
document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); moveLeft(); }, {passive:false});
document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); moveRight(); }, {passive:false});
document.getElementById('downBtn').addEventListener('touchstart', e => { e.preventDefault(); moveDown(); }, {passive:false});
document.getElementById('rotBtn').addEventListener('touchstart', e => { e.preventDefault(); rotatePiece(); }, {passive:false});
document.getElementById('dropBtn').addEventListener('touchstart', e => { e.preventDefault(); hardDrop(); }, {passive:false});

// Also click for desktop testing of mobile buttons
document.getElementById('leftBtn').onclick = moveLeft;
document.getElementById('rightBtn').onclick = moveRight;
document.getElementById('downBtn').onclick = moveDown;
document.getElementById('rotBtn').onclick = rotatePiece;
document.getElementById('dropBtn').onclick = hardDrop;

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
